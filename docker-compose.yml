name: prueba-docker

services:
  db:
    image: postgres:17-alpine
    container_name: prueba-docker-db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-todo_app}"
      POSTGRES_USER: "${POSTGRES_USER:-todo_app}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-todo_app}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: prueba-docker:latest
    container_name: prueba-docker
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: "${DATABASE_URL:-}"
      PGHOST: db
      PGPORT: "5432"
      PGDATABASE: "${POSTGRES_DB:-todo_app}"
      PGUSER: "${POSTGRES_USER:-todo_app}"
      PGPASSWORD: "${POSTGRES_PASSWORD:-todo_app}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
